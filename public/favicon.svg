<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0b0f1e"/>
  <!-- Solar panel -->
  <g transform="translate(10,8)">
    <rect x="2" y="6" width="40" height="28" rx="3" fill="#1c2540" stroke="#F5D200" stroke-width="2"/>
    <!-- Grid lines horizontal -->
    <line x1="2" y1="15.5" x2="42" y2="15.5" stroke="#F5D200" stroke-width="0.8" opacity="0.6"/>
    <line x1="2" y1="25" x2="42" y2="25" stroke="#F5D200" stroke-width="0.8" opacity="0.6"/>
    <!-- Grid lines vertical -->
    <line x1="15" y1="6" x2="15" y2="34" stroke="#F5D200" stroke-width="0.8" opacity="0.6"/>
    <line x1="29" y1="6" x2="29" y2="34" stroke="#F5D200" stroke-width="0.8" opacity="0.6"/>
    <!-- Sun rays -->
    <circle cx="22" cy="2" r="2" fill="#F5D200"/>
    <line x1="22" y1="-3" x2="22" y2="-1" stroke="#F5D200" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="17" y1="-1" x2="18.5" y2="0.5" stroke="#F5D200" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="27" y1="-1" x2="25.5" y2="0.5" stroke="#F5D200" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Stand -->
    <rect x="19" y="34" width="6" height="4" fill="#253050"/>
  </g>
  <!-- Gear (maintenance) -->
  <g transform="translate(44,46)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00e5a0" stroke-width="2.2"/>
    <circle cx="0" cy="0" r="2.2" fill="#00e5a0"/>
    <!-- Gear teeth -->
    <rect x="-1.3" y="-9" width="2.6" height="4" rx="0.8" fill="#00e5a0"/>
    <rect x="-1.3" y="5" width="2.6" height="4" rx="0.8" fill="#00e5a0"/>
    <rect x="-9" y="-1.3" width="4" height="2.6" rx="0.8" fill="#00e5a0"/>
    <rect x="5" y="-1.3" width="4" height="2.6" rx="0.8" fill="#00e5a0"/>
    <rect x="4.2" y="-6.5" width="2.6" height="4" rx="0.8" fill="#00e5a0" transform="rotate(45,5.5,-4.5)"/>
    <rect x="-6.8" y="2.5" width="2.6" height="4" rx="0.8" fill="#00e5a0" transform="rotate(45,-5.5,4.5)"/>
    <rect x="-6.8" y="-6.5" width="2.6" height="4" rx="0.8" fill="#00e5a0" transform="rotate(-45,-5.5,-4.5)"/>
    <rect x="4.2" y="2.5" width="2.6" height="4" rx="0.8" fill="#00e5a0" transform="rotate(-45,5.5,4.5)"/>
  </g>
  <!-- Wrench hint -->
  <text x="8" y="56" font-size="11" font-family="monospace" font-weight="700" fill="#F5D200" opacity="0.9">SDM</text>
</svg>
